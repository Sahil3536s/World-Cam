<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldCam Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }
  
  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a0a0f, #12121e, #0d0d18);
    position: relative;
    overflow: hidden;
  }

  /* Radial glow blobs */
  body::before, body::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 0;
  }
  body::before {
    top: -15%; 
    right: -10%;
    width: 600px; 
    height: 600px;
    background: radial-gradient(circle, rgba(220,50,50,0.12) 0%, transparent 70%);
  }
  body::after {
    bottom: -15%; 
    left: -10%;
    width: 500px; 
    height: 500px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
  }

  .login-container {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 10;
  }

  /* HEADER / LOGO */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  
  .app-icon {
    width: 52px; 
    height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, #e03535, #c0392b);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px auto;
    box-shadow: 0 0 20px rgba(220,50,50,0.35);
  }

  .app-icon svg {
    width: 24px; 
    height: 24px;
    fill: none;
    stroke: white;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .title {
    color: white;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .subtitle {
    color: rgba(255,255,255,0.45);
    font-size: 14px;
  }

  /* CARD */
  .card {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 1.75rem;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* FORM GROUP */
  .form-group {
    margin-bottom: 18px;
    position: relative;
  }

  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .input-label {
    text-transform: uppercase;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
  }

  .forgot-link {
    color: rgba(220,80,50,0.85);
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    transition: 0.2s ease;
  }
  
  .forgot-link:hover { 
    color: rgba(220,100,70,1); 
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    width: 16px; 
    height: 16px;
    fill: rgba(255,255,255,0.35);
    pointer-events: none;
    transition: 0.2s ease;
  }

  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 11px 14px 11px 40px;
    color: white;
    font-size: 14px;
    font-family: inherit;
    transition: 0.2s ease;
    outline: none;
  }

  .form-input:focus {
    border-color: rgba(220,80,50,0.6);
    background: rgba(255,255,255,0.09);
  }

  .form-input:focus ~ .input-icon,
  .form-input:focus ~ .eye-icon {
    fill: rgba(220,80,50,0.8);
  }

  .eye-icon {
    position: absolute;
    right: 14px;
    width: 16px; 
    height: 16px;
    fill: rgba(255,255,255,0.35);
    cursor: pointer;
    transition: 0.2s ease;
  }
  
  .eye-icon:hover { 
    fill: rgba(255,255,255,0.7); 
  }

  /* SUBMIT BUTTON */
  .submit-btn {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    background: linear-gradient(135deg, #e03535, #c42b2b);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(220,50,50,0.4);
    transition: 0.2s ease;
  }

  .submit-btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(220,50,50,0.5);
  }
  
  .submit-btn:active { 
    transform: translateY(0); 
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    margin: 24px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: rgba(255,255,255,0.1);
  }
  .divider span {
    padding: 0 12px;
    color: rgba(255,255,255,0.25);
    font-size: 12px;
  }

  /* SOCIAL BUTTONS */
  .social-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .social-btn {
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: 0.2s ease;
    text-decoration: none;
  }

  .social-btn:hover {
    background: rgba(255,255,255,0.09);
    color: white;
  }

  .social-btn svg { 
    width: 16px; 
    height: 16px; 
  }

  /* FOOTER */
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 13.5px;
    color: rgba(255,255,255,0.3);
  }
  
  .footer a {
    color: rgba(220,80,50,0.85);
    font-weight: 500;
    text-decoration: none;
    transition: 0.2s ease;
    margin-left: 4px;
  }
  
  .footer a:hover { 
    color: rgba(220,100,70,1); 
  }
</style>
</head>
<body>

<div class="login-container">
  <!-- LOGO & TEXT -->
  <div class="header">
    <div class="app-icon">
      <!-- Camera Lens SVG -->
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9" />
        <circle cx="12" cy="12" r="5" />
        <circle cx="12" cy="12" r="2" />
      </svg>
    </div>
    <div class="title">Welcome back</div>
    <div class="subtitle">Sign in to your WorldCam account</div>
  </div>

  <div class="card">
    
    <!-- EMAIL -->
    <div class="form-group">
      <div class="label-row">
        <label class="input-label">Email Address</label>
      </div>
      <div class="input-wrapper">
        <!-- Email Icon -->
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M20,4H4C2.897,4,2,4.897,2,6v12c0,1.103,0.897,2,2,2h16c1.103,0,2-0.897,2-2V6C22,4.897,21.103,4,20,4z M20,6v0.511 l-8,6.223L4,6.512V6H20z M4,18V9.044l7.386,5.745C11.566,14.93,11.783,15,12,15s0.434-0.07,0.614-0.211L20,9.044L20.002,18H4z"/></svg>
        <input type="email" class="form-input" placeholder="name@example.com">
      </div>
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <div class="label-row">
        <label class="input-label">Password</label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <div class="input-wrapper">
        <!-- Lock Icon -->
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M18,10h-1V7c0-2.757-2.243-5-5-5S7,4.243,7,7v3H6c-1.103,0-2,0.897-2,2v8c0,1.103,0.897,2,2,2h12c1.103,0,2-0.897,2-2v-8 C20,10.897,19.103,10,18,10z M9,7c0-1.654,1.346-3,3-3s3,1.346,3,3v3H9V7z M18,20H6v-8h12V20z M12,13c-1.103,0-2,0.897-2,2 s0.897,2,2,2s2-0.897,2-2S13.103,13,12,13z"/></svg>
        <input type="password" class="form-input" placeholder="Enter your password">
        <!-- Eye Icon -->
        <svg class="eye-icon" viewBox="0 0 24 24"><path d="M12,5C7.027,5,2.715,8.134,0.407,12.5C2.715,16.866,7.027,20,12,20s9.285-3.134,11.593-7.5C21.285,8.134,16.973,5,12,5z M12,18 c-4.041,0-7.795-2.298-9.878-6c2.083-3.702,5.837-6,9.878-6s7.795,2.298,9.878,6C19.795,15.702,16.041,18,12,18z M12,8 c-2.206,0-4,1.794-4,4s1.794,4,4,4s4-1.794,4-4S14.206,8,12,8z M12,14c-1.103,0-2-0.897-2-2s0.897-2,2-2s2,0.897,2,2 S13.103,14,12,14z"/></svg>
      </div>
    </div>

    <!-- SIGN IN -->
    <button class="submit-btn" type="button">Sign In</button>

    <!-- DIVIDER -->
    <div class="divider">
      <span>or continue with</span>
    </div>

    <!-- SOCIAL BUTTONS -->
    <div class="social-grid">
      <a href="#" class="social-btn">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </a>
      <a href="#" class="social-btn">
        <svg viewBox="0 0 24 24"><path fill="#FFFFFF" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      Don't have an account?<a href="#">Create one</a>
    </div>

  </div>
</div>

</body>
</html>
